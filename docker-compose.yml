services:
  backend:
    build: ./backend
    environment:
      # SQLite file persisted on the named volume below
      DATABASE_URL: sqlite:////data/tickets.db
      JWT_SECRET: change-me-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
    volumes:
      - ticket_data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  ticket_data:
